name: trade-bot

on:
  schedule:
    # 通常BOT（日本時間）
    - cron: '0 0 * * 1-5'    # 09:00
    - cron: '0 3 * * 1-5'    # 12:00
    - cron: '0 6 * * 1-5'    # 15:00

    # シナリオ＆分析（日本時間15:50）
    - cron: '50 6 * * 1-5'

  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install yfinance requests

      # 通常BOT
      - name: Run Trade Bot
        if: github.event.schedule != '50 6 * * 1-5'
        run: python trade_bot.py
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          RUN_MODE: trade

      # シナリオ
      - name: Run Pre Scenario
        if: github.event.schedule == '50 6 * * 1-5'
        run: python trade_bot.py
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          RUN_MODE: prescenario

      # 分析
      - name: Run Analyze Logs
        if: github.event.schedule == '50 6 * * 1-5'
        run: python analyze_logs.py
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
