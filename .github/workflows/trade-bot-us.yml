name: US Trade Bot

on:
  schedule:
    # 米国市場の通常監視
    # 日本時間 23:40 / 01:00 / 04:00
    - cron: "40 14 * * 1-5"
    - cron: "0 16 * * 2-6"
    - cron: "0 19 * * 2-6"

    # 事前シナリオ通知
    # 日本時間 23:20
    - cron: "20 14 * * 1-5"

  workflow_dispatch:

jobs:
  trade-us:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance requests pandas

      - name: Run US pre-scenario mode
        if: github.event_name == 'schedule' && github.event.schedule == '20 14 * * 1-5'
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          RUN_MODE: prescenario
        run: python trade_bot_us.py

      - name: Run US trade mode
        if: |
          github.event_name == 'workflow_dispatch' ||
          (github.event_name == 'schedule' && github.event.schedule != '20 14 * * 1-5')
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          RUN_MODE: trade
        run: python trade_bot_us.py

      - name: Upload US logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: us-trade-logs
          path: logs_us/
          if-no-files-found: ignore
